<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>조이언어발달센터 · 앱 센터</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/theme.css" />
<style>
  /* ── 조이언어발달센터 따뜻한 테마 (허브 화면 전용) ───────────────── */
  :root{
    --joy-orange:#F79325; --joy-amber:#FBB13C; --joy-yellow:#FDD05A;
    --joy-ink:#5A4633; --joy-muted:#A38B6C; --joy-cream:#FFFBF3;
    --joy-line:rgba(247,147,37,.18);
  }
  body{
    background:
      radial-gradient(900px 520px at 88% -8%, rgba(253,208,90,.40), transparent 60%),
      radial-gradient(820px 480px at -8% 8%, rgba(247,147,37,.20), transparent 55%),
      radial-gradient(900px 600px at 50% 120%, rgba(251,177,60,.16), transparent 60%),
      var(--joy-cream);
    color:var(--joy-ink);
  }

  /* 헤더 */
  .topbar{margin-bottom:8px;}
  .joy-logo{height:clamp(46px,9vw,64px); width:auto; display:block;}

  /* 히어로 */
  .hero h1{color:var(--joy-ink);}
  .hero h1 .hl{
    background:linear-gradient(100deg,var(--joy-orange),var(--joy-amber));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
  }
  .hero p{color:var(--joy-muted); font-size:15.5px;}

  /* 섹션 라벨 */
  .seclbl{
    color:var(--joy-orange); display:inline-flex; align-items:center; gap:8px;
    background:rgba(247,147,37,.10); padding:7px 14px; border-radius:999px;
    border:1px solid var(--joy-line); margin-left:0;
  }
  .seclbl::before{content:"☀"; font-size:13px;}

  /* 앱 — 화살표 슬라이더 (가운데 선택, 양옆은 블러) */
  .carousel{ position:relative; margin-top:8px; }
  .viewport{ overflow:hidden; padding:16px 0 22px; cursor:grab; touch-action:pan-y; }
  .carousel.dragging .viewport{ cursor:grabbing; }
  .carousel.dragging .album{ transition:opacity .4s ease, filter .4s ease; } /* 드래그 중 스케일 전환 끔 */
  .track{
    position:relative;
    display:flex; align-items:center; gap:28px;
    transition:transform .4s cubic-bezier(.22,.61,.36,1);
    will-change:transform;
  }
  .album{
    flex:0 0 auto;
    width:clamp(168px,56vw,206px);
    display:flex; flex-direction:column;
    text-decoration:none; color:inherit;
    -webkit-user-drag:none; user-select:none;
    transition:transform .4s ease, opacity .4s ease, filter .4s ease;
  }
  .album img, .album *{ -webkit-user-drag:none; }
  .album:not(.is-active){ opacity:.45; filter:blur(2.5px); transform:scale(.84); cursor:pointer; }
  .album.is-active{ opacity:1; filter:none; transform:scale(1); }
  .album .cover{
    width:100%; aspect-ratio:1/1; border-radius:22px; display:grid; place-items:center;
    box-shadow:0 18px 30px -14px rgba(120,80,0,.5);
    transition:transform .16s ease, box-shadow .16s ease;
  }
  .album.is-active:hover .cover{ transform:translateY(-5px); box-shadow:0 26px 42px -16px rgba(120,80,0,.6); }
  .track .album:nth-child(4n+1) .cover{background:linear-gradient(150deg,#FFB454,#F2911B);}
  .track .album:nth-child(4n+2) .cover{background:linear-gradient(150deg,#FFD36B,#FBB13C);}
  .track .album:nth-child(4n+3) .cover{background:linear-gradient(150deg,#FFC68A,#F4A65B);}
  .track .album:nth-child(4n+4) .cover{background:linear-gradient(150deg,#FFE38F,#FDC830);}
  .album .cico{font-size:clamp(50px,13vw,66px); line-height:1; filter:drop-shadow(0 6px 10px rgba(120,60,0,.3));}
  .album .atitle{margin-top:13px; text-align:center; font-family:var(--font-display); font-size:18px; color:var(--joy-ink);}
  .album .asub{margin-top:2px; text-align:center; font-size:12.5px; line-height:1.4; color:var(--joy-muted); padding:0 4px;}

  /* 좌우 화살표 버튼 */
  .navbtn{
    position:absolute; top:calc(50% - 18px); transform:translateY(-50%);
    width:48px; height:48px; border-radius:50%;
    border:1px solid var(--joy-line); background:rgba(255,255,255,.92);
    color:var(--joy-orange); font-size:26px; font-weight:700; line-height:1;
    display:grid; place-items:center; cursor:pointer; z-index:6;
    box-shadow:0 10px 24px -10px rgba(120,80,0,.45);
    transition:transform .14s ease, background .14s ease, opacity .14s ease;
  }
  .navbtn:hover{ background:#fff; transform:translateY(-50%) scale(1.07); }
  .navbtn:active{ transform:translateY(-50%) scale(.93); }
  .navbtn:disabled{ opacity:.3; cursor:default; box-shadow:none; }
  .navbtn.prev{ left:max(2px,1vw); }
  .navbtn.next{ right:max(2px,1vw); }

  .albums{ margin-top:8px; }
  .albums .empty,.note{color:var(--joy-muted); text-align:center;}

  /* 상단/푸터 (라이트 테마용 색 보정) */
  .topbar{justify-content:space-between; margin-bottom:30px;}
  .hero{margin-top:6px; margin-bottom:18px;}
  .btn.ghost.homebtn{color:var(--joy-ink); background:#fff; border:1px solid var(--joy-line);}
  .btn.ghost.homebtn:hover{filter:none; background:#fff8ef;}
  .sitefoot{border-color:var(--joy-line); color:var(--joy-muted);}

  @media (max-width:520px){ .hero h1{font-size:30px;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a href="/" aria-label="홈으로"><img class="joy-logo" src="shared/assets/joy-logo.png" alt="조이언어발달센터 · Joy Language Development Center" /></a>
    <a class="btn ghost homebtn" href="/">🏠 홈으로</a>
  </div>

  <div class="hero">
    <h1>원하는 <span class="hl">앱</span>을 골라보세요</h1>
    <p>아이들의 즐거운 배움을 돕는 작은 도구 모음이에요. 카드를 눌러 바로 시작할 수 있어요.</p>
  </div>

  <div class="albums">
    <div class="empty" id="loading">불러오는 중…</div>
    <div class="carousel" id="carousel" hidden>
      <button class="navbtn prev" id="prevBtn" type="button" aria-label="이전 앱">‹</button>
      <div class="viewport"><div class="track" id="cards"></div></div>
      <button class="navbtn next" id="nextBtn" type="button" aria-label="다음 앱">›</button>
    </div>
  </div>

  <footer class="sitefoot">Copyright © <span class="year"></span> 조이 언어발달센터. All rights reserved.</footer>
</div>

<script src="shared/discover.js"></script>
<script>
async function loadSystems(){
  let ids = [];
  const files = await Discover.listFiles("");   // ["sound/system.json", ...] 또는 null
  if (files) {
    const set = new Set();
    files.forEach(p => { const m = p.match(/^([^/]+)\/system\.json$/); if (m) set.add(m[1]); });
    ids = [...set];
  } else {
    // 폴백: 액션이 만들어 둔 목록 (apps/registry.json)
    ids = await fetch("registry.json", {cache:"no-store"}).then(r=>r.ok?r.json():[]).catch(()=>[]);
  }

  const metas = await Promise.all(ids.map(id =>
    fetch(id + "/system.json").then(r => r.ok ? r.json() : null)
      .then(j => j ? Object.assign({id}, j) : null).catch(() => null)
  ));

  const list = metas.filter(Boolean).sort((a,b)=>(a.order||99)-(b.order||99) || a.title.localeCompare(b.title,"ko"));
  const track = document.getElementById("cards");
  const loading = document.getElementById("loading");
  const carousel = document.getElementById("carousel");
  const viewport = carousel.querySelector(".viewport");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if (loading) loading.remove();
  if (!list.length){ carousel.outerHTML = '<div class="empty">아직 등록된 앱이 없어요. apps 폴더에 추가해 주세요.</div>'; return; }

  // 앨범 카드 생성
  track.innerHTML = "";
  const albums = list.map((s) => {
    const link = document.createElement("a");
    link.className = "album"; link.href = s.id + "/"; link.draggable = false;
    link.addEventListener("dragstart", (e) => e.preventDefault());
    link.innerHTML =
      '<span class="cover"><span class="cico">' + (s.icon || "📦") + '</span></span>' +
      '<span class="atitle">' + (s.title || s.id) + '</span>' +
      '<span class="asub">' + (s.desc || "") + '</span>';
    track.appendChild(link);
    return link;
  });
  carousel.hidden = false;

  let active = 0;
  function offsetFor(i){ const el = albums[i]; return viewport.clientWidth / 2 - (el.offsetLeft + el.offsetWidth / 2); }
  function render(){
    albums.forEach((el, i) => el.classList.toggle("is-active", i === active));
    track.style.transform = "translateX(" + offsetFor(active) + "px)";
    prevBtn.disabled = active <= 0;
    nextBtn.disabled = active >= albums.length - 1;
    if (albums.length <= 1){ prevBtn.style.display = nextBtn.style.display = "none"; }
  }
  function go(i){ active = Math.max(0, Math.min(albums.length - 1, i)); render(); }
  requestAnimationFrame(render);
  window.addEventListener("resize", render);

  prevBtn.addEventListener("click", () => go(active - 1));
  nextBtn.addEventListener("click", () => go(active + 1));

  // 클릭: 드래그였으면 무시 / 비활성 앨범 → 가운데로 / 활성 앨범 → 열기
  let moved = 0;
  albums.forEach((el, i) => el.addEventListener("click", (e) => {
    if (moved > 6) { e.preventDefault(); return; }   // 드래그 직후 클릭 무시
    if (i !== active) { e.preventDefault(); go(i); }  // 비활성 클릭 → 가운데로
  }));

  // 앨범을 잡고 끌면 따라 돌고, 놓으면 가까운 앨범으로 스냅
  let dragging = false, sx = 0, base = 0, dxNow = 0;
  function unit(){ return albums.length > 1 ? (albums[1].offsetLeft - albums[0].offsetLeft) : (albums[0].offsetWidth + 28); }
  viewport.addEventListener("pointerdown", (e) => {
    dragging = true; sx = e.clientX; dxNow = 0; moved = 0;
    base = offsetFor(active);
    track.style.transition = "none";
    carousel.classList.add("dragging");
  });
  window.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    dxNow = e.clientX - sx;
    moved = Math.max(moved, Math.abs(dxNow));
    track.style.transform = "translateX(" + (base + dxNow) + "px)";
  });
  window.addEventListener("pointerup", () => {
    if (!dragging) return;
    dragging = false;
    carousel.classList.remove("dragging");
    track.style.transition = "";
    go(active + Math.round(-dxNow / unit()));   // 끈 거리만큼 이동 후 스냅
  });
  // 휠/트랙패드 스크롤: 드래그처럼 연속으로 따라가다 멈추면 스냅
  let wheelAccum = 0, wheelTimer = null, wheeling = false;
  viewport.addEventListener("wheel", (e) => {
    const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if (Math.abs(d) < 1) return;
    e.preventDefault();
    if (!wheeling) { wheeling = true; track.style.transition = "none"; }
    const u = unit();
    wheelAccum += d;
    // 양 끝을 살짝만 넘도록 제한
    const max = (albums.length - 1 - active) * u + u * 0.5;
    const min = -(active * u + u * 0.5);
    wheelAccum = Math.max(min, Math.min(max, wheelAccum));
    track.style.transform = "translateX(" + (offsetFor(active) - wheelAccum) + "px)";
    clearTimeout(wheelTimer);
    wheelTimer = setTimeout(() => {
      wheeling = false;
      track.style.transition = "";
      const steps = Math.round(wheelAccum / u);
      wheelAccum = 0;
      go(active + steps);
    }, 90);
  }, { passive: false });
}
loadSystems();
document.querySelectorAll(".year").forEach(e => e.textContent = new Date().getFullYear());
</script>
</body>
</html>
